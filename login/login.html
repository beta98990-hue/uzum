<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MyStore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../login/login.css">
</head>
<body>
    <main class="login-page">
        <section class="login-container">
            <div class="login-card">
                <h2>Welcome Back</h2>
                <p class="subtitle">Please login to your account</p>
                <form class="login-form">
                    <div class="input-group">
                        <input class="login-input" type="text" placeholder="Username" required>
                    </div>
                    <div class="input-group">
                        <input class="login-password-input" type="password" placeholder="Password" required>
                    </div>
                    <button class="login-button" type="button">Login</button>
                </form>
                <p class="login-text">Don't have an account? <a href="../register/register.html">Register</a></p>
            </div>
        </section>
    </main>
</body>
</html>
